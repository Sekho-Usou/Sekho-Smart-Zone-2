<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Sekho Smart Zone</title>
  <link rel="icon" type="image/png" href="../Picture/sz logo.png">
  
  <!-- Netlify Identity Widget -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  
  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <style>
    /* Custom admin styling */
    :root {
      --primary-color: #111;
      --accent-color: #df0808;
    }
    
    /* Make the interface look premium */
    .nc-appHeader-content {
      background: #111 !important;
    }
    
    .nc-appHeader-content h1 {
      color: #fff !important;
    }
    
    /* Better button styling */
    .nc-button-primary {
      background: #111 !important;
      border-radius: 25px !important;
    }
    
    .nc-button-primary:hover {
      background: #df0808 !important;
    }
    
    /* Custom logo area */
    [class*="AppHeaderSiteLink"] {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    [class*="AppHeaderSiteLink"]::before {
      content: "";
      display: inline-block;
      width: 30px;
      height: 30px;
      background: url('../Picture/sz logo.png') center/contain no-repeat;
      filter: brightness(0) invert(1);
    }
  </style>
</head>
<body>
  <script>
    // Initialize Netlify Identity
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
    
    // Custom preview template for products
    CMS.registerPreviewTemplate('products', createClass({
      render: function() {
        const entry = this.props.entry;
        const image = entry.getIn(['data', 'image']);
        const price = entry.getIn(['data', 'price']);
        const discount = entry.getIn(['data', 'discount']);
        const name = entry.getIn(['data', 'name']);
        const category = entry.getIn(['data', 'category']);
        
        return h('div', {style: {
          fontFamily: 'Poppins, sans-serif',
          padding: '20px',
          background: '#f7f8fa',
          borderRadius: '12px',
          maxWidth: '300px',
          margin: '0 auto',
          boxShadow: '0 4px 12px rgba(0,0,0,0.1)'
        }},
          h('div', {style: {
            background: '#fff',
            borderRadius: '12px',
            overflow: 'hidden',
            position: 'relative'
          }},
            image && h('img', {
              src: this.props.getAsset(image).toString(),
              style: {width: '100%', height: '200px', objectFit: 'contain', padding: '20px'}
            }),
            h('div', {style: {padding: '15px'}},
              h('h3', {style: {margin: '0 0 10px', fontSize: '16px'}}, name),
              h('p', {style: {
                color: '#e63946',
                fontWeight: 'bold',
                margin: '5px 0',
                fontSize: '18px'
              }}, '₹' + price),
              discount && h('p', {style: {
                color: '#28a745',
                fontWeight: 'bold',
                fontSize: '14px',
                margin: '5px 0'
              }}, discount),
              h('p', {style: {
                color: '#666',
                fontSize: '12px',
                textTransform: 'uppercase',
                letterSpacing: '1px'
              }}, category)
            )
          )
        );
      }
    }));
    
    // Custom logo
    CMS.registerPreviewStyle(`
      body { font-family: Poppins, sans-serif; }
      .nc-appHeader-content { background: #111 !important; }
    `);
  </script>
</body>
</html>
