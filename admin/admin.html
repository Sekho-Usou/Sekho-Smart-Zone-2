<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Inventory Manager – Sekho Smart Zone</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <header>
    <h1>Inventory Manager</h1>
    <button id="logout" class="btn secondary">Logout</button>
  </header>

  <main class="wrapper">
    <!--  LEFT: FORM  -->
    <section class="card form-box">
      <h2 id="formTitle">Add Product</h2>
      <form id="productForm" enctype="multipart/form-data">
        <input type="hidden" id="editId">

        <label>Product name *</label>
        <input id="name" required>

        <label>Category *</label>
        <select id="cat" required>
          <option>cable</option><option>charger</option><option>earpiece</option>
          <option>speaker</option><option>adapter</option><option>powerbank</option>
          <option>battery</option><option>other</option>
        </select>

        <label>Price (₹) *</label>
        <input id="price" type="number" min="1" required>

        <label>Discount text</label>
        <input id="discount" placeholder="e.g. 20% OFF">

        <label>Extra info line</label>
        <input id="extra" placeholder="e.g. USB-A to Type-C">

        <label>Stock *</label>
        <select id="stock" required>
          <option value="in">In stock</option>
          <option value="out">Out of stock</option>
        </select>

        <label>Main picture *</label>
        <input type="file" id="mainPic" accept="image/*" required>

        <label>Extra pictures (max 3)</label>
        <input type="file" id="extraPics" multiple accept="image/*" max="3">

        <div class="progress-bar" id="progress" style="display:none">
          <div class="progress-inner"></div>
          <small class="progress-text">0%</small>
        </div>

        <div class="actions">
          <button type="submit" class="btn primary">Save Product</button>
          <button type="button" class="btn secondary" id="cancelEdit" style="display:none">Cancel</button>
        </div>
        <p id="formMsg" class="msg"></p>
      </form>
    </section>

    <!--  RIGHT: LIST  -->
    <section class="card list-box">
      <h2>Product Catalogue  <small>(<span id="count">0</span> items)</small></h2>
      <input type="text" id="quickSearch" placeholder="Search by name…" class="search">
      <div class="table-wrapper">
        <table id="prodTable">
          <thead>
            <tr><th>Picture</th><th>Name</th><th>Cat</th><th>Price</th><th>Stock</th><th>Actions</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
