backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "products"
    label: "Products"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
      - label: "Slug"
        name: "slug"
        widget: "string"
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Earpiece", value: "earpiece" }
          - { label: "Cables", value: "cable" }
          - { label: "Chargers", value: "charger" }
      - label: "Image"
        name: "image"
        widget: "image"
      - label: "Price"
        name: "price"
        widget: "number"
      - label: "Stock"
        name: "stock"
        widget: "select"
        options:
          - { label: "In Stock", value: "in" }
          - { label: "Out of Stock", value: "out" }